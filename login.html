<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ATC Training System</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <main>
    <section class="login">
      <div class="login-box">

        <div class="login-header">
          <a href="index.html" class="logo">
            <div class="logo-icon">
              <span class="radar-ping"></span>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round">
                <circle cx="12" cy="12" r="10"/>
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="2"  x2="12" y2="7"/>
                <line x1="12" y1="17" x2="12" y2="22"/>
                <line x1="2"  y1="12" x2="7"  y2="12"/>
                <line x1="17" y1="12" x2="22" y2="12"/>
              </svg>
            </div>
            <div class="logo-text-wrap">
              <span class="logo-atc">ATC</span>
              <span class="logo-train"> TRAIN</span>
            </div>
          </a>
          <h1>Welcome Back</h1>
          <p>Sign in to your account</p>
        </div>

        <form class="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="john@example.com" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" />
          </div>
          <div class="form-submit">
            <button type="submit">Sign In</button>
          </div>
        </form>

        <p class="login-footer">
          Don't have an account? <a href="signup.html">Create one</a>
        </p>

      </div>
    </section>
  </main>
</body>
</html>
