<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — ATC Training System</title>
    <link rel="stylesheet" href="signup.css">
</head>

<body>
    <main>
        <section class="signup">
            <div class="signup-box">

                <div class="signup-header">
                    <a href="index.html" class="logo">
                        <div class="logo-icon">
                            <span class="radar-ping"></span>
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00d4ff"
                                stroke-width="2" stroke-linecap="round">
                                <circle cx="12" cy="12" r="10" />
                                <circle cx="12" cy="12" r="5" />
                                <line x1="12" y1="2" x2="12" y2="7" />
                                <line x1="12" y1="17" x2="12" y2="22" />
                                <line x1="2" y1="12" x2="7" y2="12" />
                                <line x1="17" y1="12" x2="22" y2="12" />
                            </svg>
                        </div>
                        <div class="logo-text-wrap">
                            <span class="logo-atc">ATC</span>
                            <span class="logo-train"> TRAIN</span>
                        </div>
                    </a>
                    <h1>Create Account</h1>
                    <p>Join the ATC Training Platform</p>
                </div>

                <form class="signup-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstname">First Name</label>
                            <input type="text" id="firstname" placeholder="John" />
                        </div>
                        <div class="form-group">
                            <label for="lastname">Last Name</label>
                            <input type="text" id="lastname" placeholder="Doe" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="john@example.com" />
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" />
                    </div>
                    <div class="form-group">
                        <label for="confirm">Confirm Password</label>
                        <input type="password" id="confirm" placeholder="••••••••" />
                    </div>
                    <div class="form-submit">
                        <button type="submit">Create Account</button>
                    </div>
                </form>

                <p class="signup-footer">
                    Already have an account? <a href="login.html">Sign In</a>
                </p>

            </div>
        </section>
    </main>
</body>

</html>
